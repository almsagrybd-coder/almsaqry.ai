<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALMSAQRY - AI TechPT</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.93/build/spline-viewer.js"></script>

  <style>
    :root {
      --bg-color: #05080e; /* أسود أعمق */
      --card-bg: #0b1120;
      --accent: #22d3ee; /* أزرق سماوي */
      --glow: #00bcd440;
    }

    *{box-sizing:border-box}
    body{margin:0;font-family:'Cairo',sans-serif;background: var(--bg-color); color:#e5e7eb; overflow-x: hidden;}
    
    /* الـ Header مع اللوجو */
    header {
      display:flex; justify-content:space-between; align-items:center; 
      padding:20px 60px; background: rgba(15, 23, 42, 0.8); 
      backdrop-filter: blur(10px); position:sticky; top:0; z-index: 1000;
      border-bottom: 1px solid rgba(34, 211, 238, 0.2);
    }
    
    /* تصميم اللوجو النصي ALMSAQRY */
    header h1.logo {
      color: var(--accent); font-weight: 900; font-size: 28px; 
      margin:0; font-family: sans-serif; /* أفضل للغة الإنجليزية */
      letter-spacing: -1px; text-shadow: 0 0 10px var(--accent);
    }
    header h1.logo span { color: white; font-weight: 300; }
    
    nav a {color:#cbd5f5; margin:0 15px; text-decoration:none; font-weight: bold; transition: 0.3s;}
    nav a:hover { color: var(--accent); }

    /* منطقة الـ 3D الخلفية */
    .spline-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
      z-index: -1; opacity: 0.8;
    }

    /* منطقة الهيرو الجديدة */
    .hero {
      height: calc(100vh - 80px); display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align:center; padding: 20px;
    }
    .hero h2 { font-size:55px; font-weight: 900; margin-bottom:10px; line-height: 1.2;}
    .hero h2 span { color: var(--accent); text-shadow: 0 0 15px var(--glow); }
    .hero p { color:#94a3b8; max-width:650px; margin:auto; font-size: 18px; line-height: 1.7;}
    
    .btn {
      margin-top:30px; padding:15px 35px; background: var(--accent); color:black; 
      border:none; border-radius:12px; cursor:pointer; font-weight:bold; font-size: 18px;
      box-shadow: 0 0 20px var(--glow); transition: 0.3s;
    }
    .btn:hover { box-shadow: 0 0 35px var(--accent); transform: translateY(-3px); }

    /* منطقة الذكاء الاصطناعي (تم تحديثها) */
    .ai-box {
      max-width:800px; margin: 100px auto; background: var(--card-bg); 
      padding:40px; border-radius:24px; border: 1px solid rgba(34, 211, 238, 0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .ai-box h2 { text-align: center; color: white; margin-bottom: 25px;}
    
    textarea {
      width:100%; padding:18px; border-radius:12px; border: 2px solid #1f2937; 
      background: #0d121c; color: white; font-size: 16px; transition: 0.3s;
    }
    textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px var(--glow); }

    #response-container {
      margin-top:25px; padding: 20px; background: rgba(31, 41, 55, 0.4); 
      border-radius: 12px; display: none; /* إخفاءContainer حتى يظهر رد */
    }
    #response { color:#22d3ee; line-height: 1.8; white-space: pre-wrap;}
    
    .copy-btn {
      margin-top: 15px; padding: 10px 20px; background: transparent; 
      color: #22d3ee; border: 1px solid #22d3ee; border-radius: 8px; 
      cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .copy-btn:hover { background: #22d3ee; color: #0b1220; }

    footer { text-align:center; padding:30px; background:#0f172a; border-top: 1px solid rgba(255,255,255,0.05);}
    
    /* تحسينات للشاشات الصغيرة */
    @media (max-width: 768px) {
        header { padding: 15px 20px; }
        .hero h2 { font-size: 38px; }
        .ai-box { padding: 20px; width: 95%; margin: 50px auto;}
    }
  </style>
</head>
<body>

<div class="spline-container">
  <spline-viewer url="https://prod.spline.design/bEa8J6o-C1i8E7WJ/scene.splinecode"></spline-viewer>
</div>

<header>
  <h1 class="logo"><span>TechPT</span> AI | ALMSAQRY</h1>
  <nav>
    <a href="#">الرئيسية</a>
    <a href="#ai">جرّب AI</a>
  </nav>
</header>

<section class="hero">
  <h2>مستقبلك مع <span>الذكاء الاصطناعي</span> يبدأ هنا 🚀</h2>
  <p>منصة ALMSAQRY لتعلم، تجربة، وإطلاق مشاريع الذكاء الاصطناعي في ليبيا والعالم.</p>
  <button class="btn" onclick="scrollToAI()">ابدأ التجربة</button>
</section>

<section id="ai" class="ai-box">
  <h2>استشر Gemini 2.5 🔥</h2>
  <textarea id="prompt" rows="5" placeholder="اكتب سؤالك التقني هنا..."></textarea>
  <button class="btn" onclick="askAI()">اسأل الآن</button>
  
  <div id="response-container">
    <p id="response"></p>
    <button id="copyBtn" class="copy-btn" onclick="copyText()">نسخ النص 📋</button>
  }
</section>

<footer>
  <p>© 2026 | TechPT by ALMSAQRY | ليبيا تبتكر</p>
</footer>

<script>
function scrollToAI(){
  document.getElementById('ai').scrollIntoView({behavior:'smooth'});
}

// إضافة ميزة Enter
document.getElementById('prompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault(); askAI();
  }
});

async function askAI(){
  const promptInput = document.getElementById('prompt');
  const resContainer = document.getElementById('response-container');
  const resBox = document.getElementById('response');
  const copyBtn = document.getElementById('copyBtn');
  
  if(!promptInput.value.trim()) return;

  // مسح الرد القديم وإظهار حالة التفكير
  resContainer.style.display = 'block';
  resBox.innerText = 'جاري التفكير...';
  copyBtn.innerText = 'نسخ النص 📋';
  copyBtn.style.borderColor = '#22d3ee';

  try {
    const response = await fetch('http://localhost:5000/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: promptInput.value })
    });

    const data = await response.json();
    
    if(data.answer) {
        resBox.innerText = data.answer;
        promptInput.value = ''; // تفريغ الخانة
    } else {
        resBox.innerText = 'فشل الحصول على رد';
    }

  } catch(err) {
    resBox.innerText = 'خطأ: السيرفر غير متصل (تأكد من CMD)';
  }
}

function copyText() {
  const text = document.getElementById('response').innerText;
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(text).then(() => {
    btn.innerText = 'تم النسخ! ✅';
    btn.style.borderColor = '#10b981';
    setTimeout(() => { btn.innerText = 'نسخ النص 📋'; btn.style.borderColor = '#22d3ee';}, 2000);
  });
}
</script>

</body>
</html>
